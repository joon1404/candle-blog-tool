<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캔들 블로그 콘텐츠 생성기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0a0e1a;--sur:#111827;--sur2:#1a2235;--sur3:#0f1929;--bor:#1e2d45;--bor2:#263a56;--green:#10b981;--gdim:rgba(16,185,129,0.1);--red:#ef4444;--amber:#f59e0b;--text:#e2e8f0;--muted:#64748b;--dim:#94a3b8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px 14px 60px;}
.wrap{max-width:900px;margin:0 auto;display:grid;gap:16px;}
.hdr{text-align:center;margin-bottom:4px;}
.badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--green);border:1px solid var(--green);padding:3px 12px;border-radius:20px;letter-spacing:2px;margin-bottom:10px;opacity:.8;}
.hdr h1{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px;}
.hdr h1 em{color:var(--green);font-style:normal;}
.hdr p{color:var(--muted);font-size:12px;}
.card{background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:18px;}
.ctitle{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.ctitle em{color:var(--green);font-style:normal;}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px;}
.cbtn{background:var(--sur2);border:1px solid var(--bor);border-radius:10px;padding:10px 7px;cursor:pointer;text-align:center;color:var(--dim);transition:all .16s;font-family:'Noto Sans KR',sans-serif;}
.cbtn:hover{border-color:var(--green);color:var(--text);transform:translateY(-1px);}
.cbtn.on{border-color:var(--green);background:var(--gdim);color:#fff;}
.cbtn .ci{font-size:18px;margin-bottom:4px;}
.cbtn .cl{font-size:11px;font-weight:500;}
.cbtn .cs{font-size:10px;color:var(--muted);margin-top:2px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
@media(max-width:580px){.row3{grid-template-columns:1fr;}}
.field label{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:5px;}
.field select{width:100%;background:var(--sur2);border:1px solid var(--bor);border-radius:8px;color:var(--text);padding:8px 10px;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;appearance:none;transition:border-color .2s;}
.field select:focus{border-color:var(--green);}
.lrow{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;}
.lbtn{flex:1;min-width:70px;background:var(--sur2);border:1px solid var(--bor);border-radius:8px;padding:7px;cursor:pointer;text-align:center;font-size:12px;color:var(--muted);transition:all .16s;font-family:'Noto Sans KR',sans-serif;}
.lbtn.on{border-color:var(--green);background:var(--gdim);color:#fff;}
.genbtn{width:100%;background:var(--green);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Noto Sans KR',sans-serif;}
.genbtn:hover:not(:disabled){background:#059669;transform:translateY(-1px);}
.genbtn:disabled{opacity:.4;cursor:not-allowed;}
.otabs{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;}
.otab{padding:5px 12px;border-radius:7px;font-size:11px;cursor:pointer;border:1px solid var(--bor);background:var(--sur2);color:var(--muted);transition:all .16s;font-family:'JetBrains Mono',monospace;}
.otab.on{background:var(--gdim);border-color:var(--green);color:var(--green);}
.panel{display:none;}.panel.show{display:block;}
.obox{background:var(--sur2);border:1px solid var(--bor);border-radius:10px;padding:16px;min-height:160px;font-size:13px;line-height:1.8;color:var(--dim);position:relative;}
.obox.rdy{color:var(--text);}
.mbox{background:var(--sur3);border:1px solid var(--bor2);border-radius:10px;padding:14px;}
.mrow{margin-bottom:9px;}
.mkey{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--green);margin-bottom:3px;}
.mval{color:var(--text);word-break:break-word;line-height:1.6;font-size:12px;}
.mval.tw{display:flex;flex-wrap:wrap;gap:4px;}
.mtag{background:var(--sur2);border:1px solid var(--bor2);border-radius:4px;padding:2px 7px;font-size:10px;color:var(--dim);}
.pblock{margin-bottom:10px;background:var(--sur3);border:1px solid var(--bor2);border-radius:9px;padding:12px;}
.pnum{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--amber);margin-bottom:4px;}
.ptitle{font-size:13px;font-weight:600;margin-bottom:5px;color:var(--text);}
.pen{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);line-height:1.6;word-break:break-word;}
.pnote{font-size:11px;color:var(--muted);margin-top:4px;}
.cpbtn{background:var(--sur);border:1px solid var(--bor);border-radius:5px;color:var(--muted);padding:4px 8px;font-size:10px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .16s;}
.cpbtn:hover{border-color:var(--green);color:var(--green);}
.abs{position:absolute;top:10px;right:10px;}
.stats{display:flex;gap:12px;flex-wrap:wrap;padding:9px 12px;background:var(--sur2);border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:10px;}
.stats b{color:var(--green);}
.loading{display:none;text-align:center;padding:36px;color:var(--muted);font-size:12px;}
.loading.show{display:block;}
.spin{width:24px;height:24px;border:2px solid var(--bor);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.hlist{display:grid;gap:7px;max-height:280px;overflow-y:auto;padding-right:3px;}
.hlist::-webkit-scrollbar{width:3px;}
.hlist::-webkit-scrollbar-thumb{background:var(--bor2);border-radius:3px;}
.hitem{background:var(--sur2);border:1px solid var(--bor);border-radius:9px;padding:11px;cursor:pointer;transition:all .16s;display:flex;align-items:center;gap:9px;}
.hitem:hover{border-color:var(--green);}
.hico{font-size:20px;flex-shrink:0;}
.hinfo{flex:1;min-width:0;}
.htitle{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hmeta{font-size:10px;color:var(--muted);margin-top:1px;font-family:'JetBrains Mono',monospace;}
.hdel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:3px;transition:color .16s;flex-shrink:0;}
.hdel:hover{color:var(--red);}
.hemp{text-align:center;padding:24px;color:var(--muted);font-size:12px;}
.md h1{font-size:18px;color:#fff;margin:12px 0 6px;}
.md h2{font-size:15px;color:var(--text);margin:10px 0 4px;border-left:3px solid var(--green);padding-left:7px;}
.md h3{font-size:13px;color:var(--dim);margin:8px 0 3px;}
.md p{margin-bottom:7px;line-height:1.8;font-size:13px;}
.md table{width:100%;border-collapse:collapse;margin:8px 0;font-size:11px;}
.md th{background:rgba(16,185,129,.1);color:var(--green);padding:6px 9px;text-align:left;border-bottom:1px solid var(--bor);}
.md td{padding:6px 9px;border-bottom:1px solid var(--bor);color:var(--dim);}
.md blockquote{border-left:3px solid var(--amber);padding-left:10px;color:var(--muted);margin:7px 0;font-style:italic;}
.md ul,.md ol{padding-left:16px;margin-bottom:7px;}
.md li{margin-bottom:2px;color:var(--dim);line-height:1.7;font-size:13px;}
.md strong{color:var(--text);}
.md hr{border:none;border-top:1px solid var(--bor);margin:12px 0;}
.md code{background:var(--sur);padding:1px 4px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--green);}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="badge">CANDLE BLOG GENERATOR v2</div>
    <h1>캔들 <em>콘텐츠</em> 생성기</h1>
    <p>블로그 포스트 · SEO 메타태그 · 이미지 프롬프트 · 히스토리 저장</p>
  </div>
  <div class="card">
    <div class="ctitle">STEP 01 — <em>캔들 패턴 선택</em></div>
    <div class="cgrid" id="cGrid"></div>
  </div>
  <div class="card">
    <div class="ctitle">STEP 02 — <em>출력 옵션</em></div>
    <div class="row3">
      <div class="field"><label>LEVEL</label>
        <select id="slv"><option value="beginner">입문자</option><option value="intermediate" selected>중급자</option><option value="advanced">고급자</option></select>
      </div>
      <div class="field"><label>TONE</label>
        <select id="stn"><option value="educational" selected>교육적</option><option value="practical">실전 매매</option><option value="analytical">분석·데이터</option></select>
      </div>
      <div class="field"><label>이미지 수</label>
        <select id="sic"><option value="3">3장</option><option value="5" selected>5장</option><option value="7">7장</option></select>
      </div>
    </div>
    <div class="field"><label>언어 선택 (복수 가능)</label>
      <div class="lrow" id="lRow">
        <button class="lbtn on" data-l="ko">🇰🇷 한국어</button>
        <button class="lbtn" data-l="en">🇺🇸 English</button>
        <button class="lbtn" data-l="ja">🇯🇵 日本語</button>
      </div>
    </div>
  </div>
  <button class="genbtn" id="gBtn" onclick="doGen()" disabled>✦ 콘텐츠 생성하기</button>
  <div class="card" id="oCard" style="display:none;">
    <div class="ctitle">OUTPUT</div>
    <div class="otabs" id="lTabs"></div>
    <div id="lPanels"></div>
  </div>
  <div class="card">
    <div class="ctitle">
      HISTORY — <em>생성 기록</em>
      <button onclick="clrHist()" style="background:none;border:none;font-size:10px;cursor:pointer;font-family:'JetBrains Mono',monospace;color:var(--muted);">전체 삭제</button>
    </div>
    <div class="hlist" id="hList"><div class="hemp">아직 생성 기록이 없습니다</div></div>
  </div>
</div>
<script>
const C=[
  {id:'basics',ic:'🕯️',lb:'캔들 기초',sb:'양봉/음봉/도지'},
  {id:'doji',ic:'➕',lb:'도지 패턴',sb:'비석/잠자리/십자'},
  {id:'hammer',ic:'🔨',lb:'망치형/교수형',sb:'Hammer/Hanging Man'},
  {id:'engulfing',ic:'🔁',lb:'장악형 패턴',sb:'Bullish/Bearish'},
  {id:'morning_star',ic:'⭐',lb:'샛별/석별형',sb:'Morning/Evening Star'},
  {id:'shooting',ic:'🌠',lb:'유성형',sb:'Shooting Star'},
  {id:'marubozu',ic:'▬',lb:'마루보즈',sb:'민머리봉'},
  {id:'harami',ic:'🫂',lb:'잉태형',sb:'Harami Pattern'},
  {id:'spinning',ic:'🌀',lb:'팽이형',sb:'Spinning Top'},
  {id:'dark_cloud',ic:'☁️',lb:'먹구름/관통형',sb:'Dark Cloud/Piercing'},
  {id:'three_white',ic:'📈',lb:'세 병사/까마귀',sb:'Three Soldiers/Crows'},
  {id:'tweezer',ic:'🤌',lb:'집게형',sb:'Tweezer Top/Bottom'},
];
const LL={ko:'🇰🇷 한국어',en:'🇺🇸 English',ja:'🇯🇵 日本語'};
const HK='cbg_v2';
let sel=null,langs=['ko'],sess={};

const cg=document.getElementById('cGrid');
C.forEach(c=>{
  const b=document.createElement('button');b.className='cbtn';b.dataset.id=c.id;
  b.innerHTML='<div class="ci">'+c.ic+'</div><div class="cl">'+c.lb+'</div><div class="cs">'+c.sb+'</div>';
  b.onclick=()=>{document.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');sel=c.id;document.getElementById('gBtn').disabled=false;};
  cg.appendChild(b);
});
document.getElementById('lRow').querySelectorAll('.lbtn').forEach(b=>{
  b.onclick=()=>{
    const l=b.dataset.l;
    if(b.classList.contains('on')){if(langs.length===1)return;langs=langs.filter(x=>x!==l);b.classList.remove('on');}
    else{langs.push(l);b.classList.add('on');}
  };
});

async function doGen(){
  if(!sel)return;sess={};
  const oc=document.getElementById('oCard');oc.style.display='block';
  oc.scrollIntoView({behavior:'smooth',block:'start'});
  const tE=document.getElementById('lTabs'),pE=document.getElementById('lPanels');
  tE.innerHTML='';pE.innerHTML='';
  langs.forEach((l,i)=>{
    const t=document.createElement('button');t.className='otab'+(i===0?' on':'');t.dataset.l=l;
    t.textContent=LL[l]+' ⋯';t.onclick=()=>swL(l);tE.appendChild(t);
    const p=document.createElement('div');p.className='panel'+(i===0?' show':'');p.id='p-'+l;
    p.innerHTML=mkP(l);pE.appendChild(p);
  });
  for(const l of langs)await gen(l);
}

function mkP(l){return '<div class="loading show" id="ld-'+l+'"><div class="spin"></div>생성 중 (포스트 → 메타태그 → 이미지 프롬프트)...</div>'
  +'<div class="otabs" id="ct-'+l+'" style="display:none;">'
  +'<button class="otab on" data-ct="post" onclick="swC(\''+l+'\',\'post\')">📝 포스트</button>'
  +'<button class="otab" data-ct="meta" onclick="swC(\''+l+'\',\'meta\')">🏷️ SEO 메타태그</button>'
  +'<button class="otab" data-ct="img" onclick="swC(\''+l+'\',\'img\')">🎨 이미지 프롬프트</button></div>'
  +'<div id="cp-'+l+'-post" class="panel show"><div class="stats" id="st-'+l+'" style="display:none;"></div>'
  +'<div class="obox" id="post-'+l+'" style="position:relative;"><button class="cpbtn abs" onclick="cp(\''+l+'\',\'post\')">COPY</button></div></div>'
  +'<div id="cp-'+l+'-meta" class="panel"><div class="mbox" id="meta-'+l+'"></div></div>'
  +'<div id="cp-'+l+'-img" class="panel"><div id="img-'+l+'"></div></div>';}

async function gen(l){
  const c=C.find(x=>x.id===sel);
  const lv=document.getElementById('slv').value;
  const tn=document.getElementById('stn').value;
  const ic=document.getElementById('sic').value;
  try{
    const post=await api(pPost(l,c,lv,tn));sess[l]={post};rPost(l,post);
    const meta=await api(pMeta(l,c,post));sess[l].meta=meta;rMeta(l,meta);
    const imgs=await api(pImg(l,c,ic));sess[l].imgs=imgs;rImg(l,imgs);
    document.getElementById('ld-'+l).classList.remove('show');
    document.getElementById('ct-'+l).style.display='flex';
    document.querySelector('.otab[data-l="'+l+'"]').textContent=LL[l]+' ✓';
    saveH(l,c,sess[l]);
  }catch(e){
    document.getElementById('ld-'+l).innerHTML='<p style="color:#ef4444;font-size:12px;">오류: '+e.message+'</p>';
    document.querySelector('.otab[data-l="'+l+'"]').textContent=LL[l]+' ✗';
  }
}

async function api(prompt){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  return d.content?.map(b=>b.text||'').join('')||'';
}

function pPost(l,c,lv,tn){
  const lm={beginner:'입문자',intermediate:'중급자',advanced:'고급자'};
  const tm={educational:'교육적',practical:'실전·매매 중심',analytical:'분석·데이터 중심'};
  const lf={ko:'한국어',en:'자연스러운 원어민 영어',ja:'자연스러운 일본어'};
  return '주식 차트 전문가로서 WordPress 블로그 포스트를 작성하세요.\n주제:'+c.lb+'('+c.sb+')|언어:'+lf[l]+'|수준:'+lm[lv]+'|톤:'+tm[tn]+'\n형식:Markdown H1/H2/H3|분량:800~1100자\n섹션:SEO제목(H1),핵심요약(굵게),개념설명,종류/변형(표),실전활용,주의사항,요약표,다음편예고\nSEO 키워드 자연스럽게 반복, 친근하고 전문적인 톤으로 작성.';}

function pMeta(l,c,post){
  const lf={ko:'한국어',en:'영어',ja:'일본어'};
  return '블로그 포스트 분석 후 WordPress SEO 메타태그를 JSON으로만 응답하세요.\n언어:'+lf[l]+'|주제:'+c.lb+'\n포스트앞부분:'+post.slice(0,400)+'\nJSON:{"title":"SEO제목(60자이내)","meta_description":"설명(150-160자)","focus_keyword":"주요키워드","secondary_keywords":["k2","k3","k4","k5"],"og_title":"SNS제목","og_description":"SNS설명(120자이내)","slug":"url-slug","tags":["t1","t2","t3","t4","t5"],"category":"카테고리"}';}

function pImg(l,c,n){
  const lf={ko:'한국어',en:'영어',ja:'일본어'};
  return '"'+c.lb+'('+c.sb+')" 블로그 포스트용 AI 이미지 프롬프트 '+n+'개를 JSON 배열로만 응답하세요.\n언어:'+lf[l]+'(제목/설명은 해당언어, 프롬프트는 영어)\n[{"number":1,"title":"제목","purpose":"역할","prompt_en":"Detailed Midjourney/DALL-E prompt","negative_prompt":"avoid list","alt_text":"SEO ALT텍스트","placement":"삽입위치"}]';}

function rPost(l,t){
  const b=document.getElementById('post-'+l);
  b.className='obox rdy md';
  b.innerHTML='<button class="cpbtn abs" onclick="cp(\''+l+'\',\'post\')">COPY</button>'+mdH(t);
  const w=t.split(/\s+/).length;
  const s=document.getElementById('st-'+l);s.style.display='flex';
  s.innerHTML='<span>단어 <b>'+w.toLocaleString()+'</b></span><span>글자 <b>'+t.length.toLocaleString()+'</b></span><span>읽기 <b>~'+Math.ceil(w/200)+'분</b></span><span style="margin-left:auto;color:var(--green)">WordPress 복붙 가능 ✓</span>';}

function rMeta(l,t){
  const b=document.getElementById('meta-'+l);let m;
  try{m=JSON.parse(t.replace(/```json|```/g,'').trim());}
  catch{b.innerHTML='<pre style="font-size:10px;white-space:pre-wrap;color:var(--dim)">'+esc(t)+'</pre>';return;}
  const rows=[['PAGE TITLE',esc(m.title),0],['META DESCRIPTION',esc(m.meta_description),0],['FOCUS KEYWORD',esc(m.focus_keyword),0],
    ['SECONDARY KEYWORDS',(m.secondary_keywords||[]).map(k=>'<span class="mtag">'+esc(k)+'</span>').join(''),1],
    ['OG TITLE',esc(m.og_title),0],['OG DESCRIPTION',esc(m.og_description),0],['URL SLUG',esc(m.slug),0],
    ['TAGS',(m.tags||[]).map(t=>'<span class="mtag">'+esc(t)+'</span>').join(''),1],['CATEGORY',esc(m.category),0]];
  b.innerHTML=rows.map(([k,v,w])=>'<div class="mrow"><div class="mkey">'+k+'</div><div class="mval'+(w?' tw':'')+'">'+v+'</div></div>').join('')
    +'<div style="margin-top:8px"><button class="cpbtn" onclick="cp(\''+l+'\',\'meta\')">COPY JSON</button></div>';}

function rImg(l,t){
  const b=document.getElementById('img-'+l);let arr;
  try{arr=JSON.parse(t.replace(/```json|```/g,'').trim());}
  catch{b.innerHTML='<pre style="font-size:10px;white-space:pre-wrap;color:var(--dim)">'+esc(t)+'</pre>';return;}
  b.innerHTML=arr.map(p=>'<div class="pblock"><div class="pnum">IMAGE '+String(p.number).padStart(2,'0')+'</div>'
    +'<div class="ptitle">'+esc(p.title||'')+'</div><div class="pen">'+esc(p.prompt_en||'')+'</div>'
    +(p.negative_prompt?'<div class="pnote" style="color:var(--red)">✗ '+esc(p.negative_prompt)+'</div>':'')
    +'<div class="pnote">📍 '+esc(p.placement||'')+' · ALT: '+esc(p.alt_text||'')+'</div>'
    +'<div class="pnote">역할: '+esc(p.purpose||'')+'</div>'
    +'<div style="margin-top:6px"><button class="cpbtn" onclick="cpT(this)" data-v="'+esc(p.prompt_en||'')+'">COPY PROMPT</button></div></div>').join('');}

function swL(l){
  document.querySelectorAll('.otab[data-l]').forEach(t=>t.classList.toggle('on',t.dataset.l===l));
  document.querySelectorAll('[id^="p-"]').forEach(p=>p.classList.remove('show'));
  const e=document.getElementById('p-'+l);if(e)e.classList.add('show');}

function swC(l,tab){
  document.querySelectorAll('#ct-'+l+' .otab').forEach(t=>t.classList.toggle('on',t.dataset.ct===tab));
  ['post','meta','img'].forEach(ct=>{const e=document.getElementById('cp-'+l+'-'+ct);if(e)e.classList.toggle('show',ct===tab);});}

function cp(l,type){
  const v=type==='post'?sess[l]?.post:type==='meta'?sess[l]?.meta:sess[l]?.imgs;
  navigator.clipboard.writeText(v||'').catch(()=>{});}
function cpT(btn){navigator.clipboard.writeText(btn.dataset.v||'').catch(()=>{});}

function saveH(l,c,data){
  let hist=[];
  try{hist=JSON.parse(localStorage.getItem(HK)||'[]');}catch{}
  hist.unshift({id:Date.now(),l,cid:c.id,clb:c.lb,cic:c.ic,csb:c.sb,ts:new Date().toISOString(),post:data.post||'',meta:data.meta||'',imgs:data.imgs||''});
  if(hist.length>30)hist=hist.slice(0,30);
  try{localStorage.setItem(HK,JSON.stringify(hist));}catch{}
  renderH();}

function getH(){try{return JSON.parse(localStorage.getItem(HK)||'[]');}catch{return [];}}

function clrHist(){
  if(!confirm('히스토리를 모두 삭제할까요?'))return;
  localStorage.removeItem(HK);renderH();}

function delH(id){
  const h=getH().filter(x=>x.id!==id);
  try{localStorage.setItem(HK,JSON.stringify(h));}catch{}renderH();}

function renderH(){
  const el=document.getElementById('hList');
  const h=getH();
  if(!h.length){el.innerHTML='<div class="hemp">아직 생성 기록이 없습니다</div>';return;}
  el.innerHTML=h.map(x=>'<div class="hitem" onclick="loadH('+x.id+')">'
    +'<div class="hico">'+x.cic+'</div>'
    +'<div class="hinfo"><div class="htitle">'+esc(x.clb)+' — '+(LL[x.l]||x.l)+'</div>'
    +'<div class="hmeta">'+esc(x.csb)+' · '+fd(x.ts)+'</div></div>'
    +'<button class="hdel" onclick="event.stopPropagation();delH('+x.id+')">✕</button></div>').join('');}

function loadH(id){
  const item=getH().find(x=>x.id===id);if(!item)return;
  sess[item.l]={post:item.post,meta:item.meta,imgs:item.imgs};
  langs=[item.l];sel=item.cid;
  const oc=document.getElementById('oCard');oc.style.display='block';
  const tE=document.getElementById('lTabs'),pE=document.getElementById('lPanels');
  tE.innerHTML='';pE.innerHTML='';
  const t=document.createElement('button');t.className='otab on';t.dataset.l=item.l;
  t.textContent=LL[item.l]+' ✓';t.onclick=()=>swL(item.l);tE.appendChild(t);
  const p=document.createElement('div');p.className='panel show';p.id='p-'+item.l;
  p.innerHTML=mkP(item.l);pE.appendChild(p);
  document.getElementById('ld-'+item.l).classList.remove('show');
  document.getElementById('ct-'+item.l).style.display='flex';
  rPost(item.l,item.post);rMeta(item.l,item.meta);rImg(item.l,item.imgs);
  oc.scrollIntoView({behavior:'smooth',block:'start'});}

function fd(iso){const d=new Date(iso);return (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mdH(t){
  return t.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>').replace(/^---$/gm,'<hr>')
    .replace(/^\| (.+) \|$/gm,m=>{const cc=m.split('|').filter(c=>c.trim());return '<tr>'+cc.map(c=>'<td>'+c.trim()+'</td>').join('')+'</tr>';})
    .replace(/(<tr>[\s\S]*?<\/tr>\n?)+/g,t=>{const rr=t.trim().split('\n').filter(r=>r.includes('<tr>'));if(!rr.length)return t;const hd=rr[0].replace(/<td>/g,'<th>').replace(/<\/td>/g,'</th>');return '<table><thead>'+hd+'</thead><tbody>'+rr.slice(2).join('')+'</tbody></table>';})
    .replace(/^[\-\*] (.+)$/gm,'<li>$1</li>').replace(/(<li>[\s\S]*?<\/li>\n?)+/g,t=>'<ul>'+t+'</ul>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>').replace(/\n\n/g,'</p><p>').replace(/^(?!<[htubplir])(.+)$/gm,'<p>$1</p>');}

renderH();
</script>
</body>
</html>
